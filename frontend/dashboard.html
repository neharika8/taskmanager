<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    
    <div class="d-flex justify-content-between align-items-center">
      <h3>Task Manager</h3>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="mt-3 d-flex gap-2">
      <input id="taskInput" class="form-control" placeholder="Enter task">
      <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>

    <ul id="list" class="list-group mt-4"></ul>

  </div>
</div>

<script>
const token = localStorage.getItem("token");

if(!token){
  window.location = "login.html";
}

// Load Tasks
async function loadTasks(){
  try {
    const res = await fetch("https://taskmanager-thdl.onrender.com/api/tasks",{
      headers:{ authorization: token }
    });

    const tasks = await res.json();
    const list = document.getElementById("list");
    list.innerHTML = "";

    tasks.forEach(t=>{
      const li = document.createElement("li");
      li.className = "list-group-item d-flex justify-content-between align-items-center";

      li.innerHTML = `
        <span style="text-decoration:${t.completed ? 'line-through':'none'}">
          ${t.text}
        </span>

        <div>
          <button class="btn btn-success btn-sm me-2" onclick="toggle('${t._id}')">✔</button>
          <button class="btn btn-danger btn-sm" onclick="del('${t._id}')">Delete</button>
        </div>
      `;

      list.appendChild(li);
    });

  } catch (err) {
    alert("Error loading tasks");
  }
}

// Add Task
async function addTask(){
  const input = document.getElementById("taskInput");

  if(input.value.trim() === ""){
    return alert("Enter a task");
  }

  try {
    await fetch("https://taskmanager-thdl.onrender.com/api/tasks",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        authorization: token
      },
      body: JSON.stringify({ text: input.value })
    });

    input.value = "";
    loadTasks();

  } catch (err) {
    alert("Error adding task");
  }
}

// Delete Task
async function del(id){
  try {
    await fetch(`https://taskmanager-thdl.onrender.com/api/tasks/${id}`,{
      method:"DELETE",
      headers:{ authorization: token }
    });

    loadTasks();

  } catch (err) {
    alert("Error deleting task");
  }
}

// Toggle Complete
async function toggle(id){
  try {
    await fetch(`https://taskmanager-thdl.onrender.com/api/tasks/${id}`,{
      method:"PUT",
      headers:{ authorization: token }
    });

    loadTasks();

  } catch (err) {
    alert("Error updating task");
  }
}

// Logout
function logout(){
  localStorage.removeItem("token");
  window.location = "login.html";
}

// Initial load
loadTasks();
</script>

</body>
</html>
