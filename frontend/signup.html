<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-3">Signup</h3>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-success w-100" onclick="signup()">Signup</button>

    <p class="text-center mt-3">
      Already have an account? 
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script>
async function signup(){
  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  if(nameInput.value.trim() === "" || emailInput.value.trim() === "" || passwordInput.value.trim() === ""){
    return alert("Please fill all fields");
  }

  try {
    const res = await fetch("https://taskmanager-thdl.onrender.com/api/auth/signup",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name: nameInput.value,
        email: emailInput.value,
        password: passwordInput.value
      })
    });

    const data = await res.json();

    if(data.message){
      alert("Signup successful!");
      
      // clear fields
      nameInput.value = "";
      emailInput.value = "";
      passwordInput.value = "";

      window.location = "login.html";
    } else {
      alert("Signup failed");
    }

  } catch (err) {
    alert("Server error. Please try again.");
  }
}
</script>

</body>
</html>
